<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>asdf - 리듬게임</title>
  <meta name="description" content="asdf 리듬게임 - 화살표를 맞춰 리듬을 타세요!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ===== 가로 모드 안내 (세로일 때) ===== -->
<div id="rotateOverlay" class="rotate-overlay">
  <div class="rotate-box">
    <div class="rotate-icon">📱</div>
    <div class="rotate-arrow">↻</div>
    <p>핸드폰을 가로로 돌려주세요</p>
    <span>Please rotate to landscape</span>
  </div>
</div>

<!-- ===== 서리 캔버스 (전체 레이어) ===== -->
<canvas id="frostCanvas" class="frost-canvas"></canvas>

<!-- ===== MAIN MENU ===== -->
<div id="screen-menu" class="screen active">
  <div class="menu-bg-particles" id="menuParticles"></div>
  <div class="menu-center">
    <div class="logo-wrap">
      <h1 class="logo-title">asdf</h1>
      <p class="logo-sub">리듬게임</p>
    </div>
    <div class="menu-buttons">
      <button class="menu-btn primary" id="btnPlay">▶ 플레이</button>
      <button class="menu-btn" id="btnDev">🛠 개발자 모드</button>
    </div>
    <div class="key-hint">
      <span class="key-label">A</span>
      <span class="key-label">S</span>
      <span class="key-label">D</span>
      <span class="key-label">F</span>
      <span class="key-hint-sub">또는 방향키</span>
    </div>
  </div>
</div>

<!-- ===== SONG SELECT ===== -->
<div id="screen-select" class="screen">
  <div class="select-header">
    <button class="back-btn" id="btnBackFromSelect">← 뒤로</button>
    <h2 class="select-title">노래 선택</h2>
    <div class="difficulty-tabs">
      <button class="diff-tab active" data-diff="easy">EASY</button>
      <button class="diff-tab" data-diff="normal">NORMAL</button>
      <button class="diff-tab" data-diff="hard">HARD</button>
    </div>
  </div>
  <div class="song-list-wrap">
    <div class="song-list" id="songList"></div>
  </div>
  <div class="song-preview" id="songPreview">
    <div class="preview-art" id="previewArt"></div>
    <div class="preview-info">
      <div class="preview-title" id="previewTitle">노래를 선택하세요</div>
      <div class="preview-artist" id="previewArtist"></div>
      <div class="preview-bpm" id="previewBpm"></div>
      <div class="preview-stars" id="previewStars"></div>
    </div>
    <button class="play-btn" id="btnStartGame" disabled>게임 시작</button>
  </div>
</div>

<!-- ===== GAMEPLAY ===== -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="game-song-info">
      <span class="game-song-name" id="gameSongName"></span>
      <span class="game-diff-badge" id="gameDiffBadge"></span>
    </div>
    <div class="game-stats">
      <div class="stat-block">
        <div class="stat-label">SCORE</div>
        <div class="stat-value" id="scoreDisplay">0</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">COMBO</div>
        <div class="stat-value" id="comboDisplay">0</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">ACC</div>
        <div class="stat-value" id="accDisplay">100%</div>
      </div>
    </div>
    <button class="pause-btn" id="btnPause">⏸</button>
  </div>

  <!-- progress bar -->
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- lane area -->
  <div class="lane-area" id="laneArea">
    <div class="lane" data-lane="left">
      <div class="lane-line"></div>
      <div class="hit-zone" id="hitLeft">←</div>
    </div>
    <div class="lane" data-lane="down">
      <div class="lane-line"></div>
      <div class="hit-zone" id="hitDown">↓</div>
    </div>
    <div class="lane" data-lane="up">
      <div class="lane-line"></div>
      <div class="hit-zone" id="hitUp">↑</div>
    </div>
    <div class="lane" data-lane="right">
      <div class="lane-line"></div>
      <div class="hit-zone" id="hitRight">→</div>
    </div>
  </div>

  <!-- judgment display -->
  <div class="judgment-display" id="judgmentDisplay"></div>
  <div class="combo-display" id="comboDisplayFly"></div>
</div>

<!-- PAUSE OVERLAY -->
<div id="pauseOverlay" class="overlay hidden">
  <div class="overlay-box frost-panel">
    <h2>일시정지</h2>
    <button class="menu-btn primary" id="btnResume">계속하기</button>
    <button class="menu-btn" id="btnRestartFromPause">다시 시작</button>
    <button class="menu-btn danger" id="btnQuitGame">나가기</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="screen-result" class="screen">
  <div class="result-wrap">
    <div class="result-rank" id="resultRank">S</div>
    <div class="result-song" id="resultSong"></div>
    <div class="result-stats">
      <div class="result-stat frost-panel"><span>점수</span><strong id="rScore">0</strong></div>
      <div class="result-stat frost-panel"><span>최대 콤보</span><strong id="rMaxCombo">0</strong></div>
      <div class="result-stat frost-panel"><span>정확도</span><strong id="rAcc">100%</strong></div>
      <div class="result-stat frost-panel"><span>PERFECT</span><strong id="rPerfect">0</strong></div>
      <div class="result-stat frost-panel"><span>GOOD</span><strong id="rGood">0</strong></div>
      <div class="result-stat frost-panel"><span>MISS</span><strong id="rMiss">0</strong></div>
    </div>
    <div class="result-btns">
      <button class="menu-btn primary" id="btnRetry">다시 플레이</button>
      <button class="menu-btn" id="btnBackToSelect">노래 선택으로</button>
    </div>
  </div>
</div>

<!-- ===== DEVELOPER MODE ===== -->
<div id="screen-dev" class="screen">
  <div class="dev-header">
    <button class="back-btn" id="btnBackFromDev">← 뒤로</button>
    <h2 class="dev-title">🛠 개발자 모드 - 노래 에디터</h2>
  </div>
  <div class="dev-body">
    <!-- Song Meta -->
    <div class="dev-panel frost-panel">
      <h3 class="dev-panel-title">노래 정보</h3>
      <div class="dev-form">
        <label>제목</label>
        <input type="text" id="devTitle" placeholder="노래 제목" />
        <label>아티스트</label>
        <input type="text" id="devArtist" placeholder="아티스트 이름" />
        <label>BPM</label>
        <input type="number" id="devBpm" placeholder="120" min="60" max="300" value="120" />
        <label>난이도</label>
        <select id="devDifficulty">
          <option value="easy">EASY</option>
          <option value="normal" selected>NORMAL</option>
          <option value="hard">HARD</option>
        </select>
        <label>별점 (1-5)</label>
        <input type="number" id="devStars" min="1" max="5" value="3" />
        <label>테마 색상</label>
        <input type="color" id="devColor" value="#32CD32" />
      </div>
    </div>

    <!-- Note Editor -->
    <div class="dev-panel wide frost-panel">
      <h3 class="dev-panel-title">노트 에디터</h3>
      <div class="dev-editor-controls">
        <span>방향:</span>
        <button class="dev-btn arrow-btn" data-dir="left" title="왼쪽(A)">←</button>
        <button class="dev-btn arrow-btn" data-dir="down" title="아래(S)">↓</button>
        <button class="dev-btn arrow-btn" data-dir="up" title="위(D)">↑</button>
        <button class="dev-btn arrow-btn" data-dir="right" title="오른쪽(F)">→</button>
        <span style="margin-left:12px;">박자:</span>
        <input type="number" id="devBeat" value="0" min="0" step="0.25" style="width:70px;" />
        <button class="dev-btn" id="btnAddNote">노트 추가</button>
        <button class="dev-btn danger" id="btnClearNotes">전체 삭제</button>
        <button class="dev-btn accent" id="btnImportNotes">📋 JSON 불러오기</button>
      </div>

      <!-- Visual timeline -->
      <div class="dev-timeline-wrap">
        <div class="dev-timeline-header">
          <span class="tl-lane">←</span>
          <span class="tl-lane">↓</span>
          <span class="tl-lane">↑</span>
          <span class="tl-lane">→</span>
          <span class="tl-beat">박자</span>
          <span class="tl-del"></span>
        </div>
        <div class="dev-timeline" id="devTimeline"></div>
      </div>
    </div>

    <!-- Pattern Presets -->
    <div class="dev-panel frost-panel">
      <h3 class="dev-panel-title">빠른 패턴 삽입</h3>
      <div class="dev-presets">
        <button class="dev-btn preset-btn" data-preset="basic4">기본 4박</button>
        <button class="dev-btn preset-btn" data-preset="alternating">좌우 교차</button>
        <button class="dev-btn preset-btn" data-preset="allDown">4방향 연속</button>
        <button class="dev-btn preset-btn" data-preset="scale">스케일 업</button>
        <button class="dev-btn preset-btn" data-preset="random4">랜덤 4박</button>
      </div>
    </div>

    <!-- JSON Output -->
    <div class="dev-panel wide frost-panel">
      <h3 class="dev-panel-title">JSON 출력 / 저장</h3>
      <div class="dev-json-controls">
        <button class="dev-btn primary" id="btnGenerateJson">JSON 생성</button>
        <button class="dev-btn accent" id="btnSaveSong">💾 노래 저장</button>
        <button class="dev-btn" id="btnExportJson">📤 내보내기</button>
        <button class="dev-btn" id="btnLoadJson">📥 파일 로드</button>
        <input type="file" id="fileInput" accept=".json" style="display:none" />
      </div>
      <textarea id="devJsonOutput" class="dev-json-output" placeholder="여기에 JSON이 생성됩니다..." readonly></textarea>
    </div>

    <!-- Saved Songs Manager -->
    <div class="dev-panel wide frost-panel">
      <h3 class="dev-panel-title">저장된 노래 관리</h3>
      <div class="dev-saved-list" id="devSavedList"></div>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
